<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Guide de l'Assistant Social — ASSP</title>
  <link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf7ef; --card:#ffffff; --border:#e7e1d2; --ink:#2b332f; --sub:#7a8480; --muted:#9a8f6f;
    --gold:#c9a24a; --agees:#0f766e; --agees-soft:#e8f3f1; --enfance:#0e7490; --enfance-soft:#e6f2f4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{color:var(--ink);-webkit-font-smoothing:antialiased;}
  body.lang-ar{font-family:'Tajawal','Segoe UI',sans-serif;}
  body.lang-fr{font-family:'Inter','Segoe UI',sans-serif;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}
  .icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon svg{width:100%;height:100%;}

  .topbar{position:sticky;top:0;z-index:10;background:rgba(250,247,239,0.95);backdrop-filter:blur(6px);
    padding:20px 16px 12px;border-bottom:1px solid #eee7d5;}
  .backbtn{display:flex;align-items:center;gap:4px;font-size:13.5px;font-weight:600;background:none;border:none;
    margin-bottom:12px;padding:0;}
  .backbtn .icon{width:16px;height:16px;}
  [dir="ltr"] .flip{transform:scaleX(-1);}

  .toprow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
  .langbtn{display:flex;align-items:center;gap:5px;border:1px solid var(--border);background:#fff;border-radius:999px;
    padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--ink);flex-shrink:0;}
  .langbtn .icon{width:13px;height:13px;}

  .home-wrap{padding:24px 16px 40px;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--muted);margin-bottom:4px;}
  h1{font-size:22px;font-weight:800;line-height:1.25;margin:0 0 4px;}
  .lead{font-size:13.5px;color:var(--sub);line-height:1.6;margin:0 0 20px;}

  .searchbox{position:relative;margin-bottom:24px;}
  .searchbox input{width:100%;border:1px solid var(--border);background:var(--card);border-radius:16px;
    padding:12px 40px 12px 16px;font-size:14px;color:var(--ink);outline:none;}
  .searchbox input:focus{border-color:var(--agees);}
  [dir="rtl"] .searchbox .icon-search{right:14px;}
  [dir="ltr"] .searchbox .icon-search{left:14px;}
  .searchbox .icon-search{position:absolute;top:50%;transform:translateY(-50%);width:17px;height:17px;color:#a39c86;}
  [dir="rtl"] .searchbox input{padding:12px 40px 12px 16px;}
  [dir="ltr"] .searchbox input{padding:12px 16px 12px 40px;}
  [dir="rtl"] .searchbox .icon-clear{left:14px;}
  [dir="ltr"] .searchbox .icon-clear{right:14px;}
  .searchbox .icon-clear{position:absolute;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#a39c86;background:none;border:none;padding:0;display:none;}
  .searchbox input:not(:placeholder-shown) ~ .icon-clear{display:block;}

  .cat-card{width:100%;text-align:start;border:none;border-radius:20px;padding:20px;
    display:flex;align-items:center;gap:16px;margin-bottom:12px;color:#fff;}
  .cat-card:active{transform:scale(0.98);}
  .cat-icon-wrap{width:56px;height:56px;flex-shrink:0;border-radius:16px;background:rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;}
  .cat-icon-wrap .icon{width:26px;height:26px;color:#fff;}
  .cat-title{font-size:17px;font-weight:800;}
  .cat-sub{font-size:12.5px;color:rgba(255,255,255,0.8);margin-top:2px;}
  .cat-count{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;}
  .cat-chevron{width:20px;height:20px;color:rgba(255,255,255,0.7);flex-shrink:0;}

  .results-count{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
  .no-results{text-align:center;font-size:13.5px;color:#a39c86;padding:40px 0;}

  .disp-card{width:100%;text-align:start;border-radius:18px;background:var(--card);border:1px solid var(--border);
    padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .disp-card:active{transform:scale(0.98);}
  .disp-group{font-size:13px;font-weight:500;margin-bottom:4px;}
  .disp-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.4;}
  .disp-desc{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .disp-chevron{width:18px;height:18px;color:#b8b09a;flex-shrink:0;margin-top:4px;}
  .edited-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-inline-start:6px;}

  .cat-header{display:flex;align-items:center;gap:12px;}
  .cat-header-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
  .cat-header-icon .icon{width:20px;height:20px;}
  .cat-header h1{font-size:19px;}
  .cat-header .sub{font-size:12px;color:#8a8370;}

  .body-pad{padding:16px;padding-bottom:90px;}

  .tabs{display:flex;gap:8px;margin:14px 0 16px;}
  .tab{flex:1;text-align:center;border-radius:12px;padding:10px 8px;font-size:13.5px;font-weight:700;
    border:1px solid var(--border);background:#fff;color:#5a635f;}
  .tab.active{color:#fff;border-color:transparent;}

  .fw-block{border-radius:18px;background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
  .fw-block-title{font-size:13px;font-weight:800;margin-bottom:10px;}
  .fw-item{margin-bottom:10px;}
  .fw-item:last-child{margin-bottom:0;}
  .fw-item .term{font-size:13px;font-weight:700;margin-bottom:2px;}
  .fw-item .text{font-size:13px;color:#5a635f;line-height:1.6;}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin:0 -16px 16px;padding-inline:16px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;border-radius:999px;padding:7px 16px;font-size:13px;font-weight:500;white-space:nowrap;
    background:#fff;color:#3c4a47;border:1px solid #dcd6c8;}
  .chip.active{color:#fdfaf3;}

  .detail-eyebrow{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .detail-title{font-size:19px;font-weight:800;line-height:1.35;margin:0;}
  .detail-legal{display:flex;align-items:flex-start;gap:6px;margin-top:8px;font-size:12.5px;color:var(--sub);}
  .detail-legal .icon{width:13px;height:13px;margin-top:2px;flex-shrink:0;}
  .detail-actions{display:flex;gap:8px;margin-top:12px;}
  .action-btn{display:flex;align-items:center;gap:6px;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;
    border:1px solid var(--border);background:#fff;color:var(--ink);}
  .action-btn .icon{width:14px;height:14px;}
  .action-btn.danger{color:#b3401f;border-color:#f0d3c4;background:#fdf3ee;}

  .desc-box{border-radius:18px;padding:16px;font-size:14px;line-height:1.7;color:#454f4b;margin-bottom:16px;}
  .notes-box{border-radius:18px;border:1px solid #e0c98a;background:#fdf8ea;color:#7a5c14;
    padding:16px;font-size:13.5px;line-height:1.7;margin-bottom:16px;white-space:pre-line;}

  .section{border-radius:18px;background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px;}
  .section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .section-icon .icon{width:15px;height:15px;}
  .section-title{font-size:15px;font-weight:800;}

  ul.bullets{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  ul.bullets li{display:flex;gap:8px;font-size:14px;line-height:1.65;color:#454f4b;}
  ul.bullets li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:8px;}

  ol.steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
  ol.steps li{display:flex;gap:10px;font-size:14px;line-height:1.65;color:#454f4b;}
  .step-num{width:24px;height:24px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .mini-table{display:flex;flex-direction:column;gap:8px;}
  .mini-row{border-radius:12px;border:1px solid var(--border);padding:12px;}
  .mini-a{font-size:13.5px;font-weight:800;margin-bottom:4px;}
  .mini-b{font-size:13px;color:#5a635f;margin-bottom:2px;}
  .mini-c{font-size:12.5px;color:#7a8480;}

  .amount-box{border-radius:12px;padding:12px;margin-bottom:8px;}
  .amount-box:last-child{margin-bottom:0;}
  .amount-value{font-size:15px;font-weight:800;margin-bottom:4px;}
  .amount-who{font-size:13px;color:#5a635f;line-height:1.6;}

  .fab{position:fixed;bottom:24px;width:56px;height:56px;border-radius:50%;border:none;color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.18);z-index:20;}
  [dir="rtl"] .fab{left:50%;margin-left:-172px;}
  [dir="ltr"] .fab{left:50%;margin-left:126px;}
  .fab .icon{width:24px;height:24px;}

  .form-wrap{padding:16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .field .hint{font-size:11.5px;color:var(--muted);font-weight:400;margin-inline-start:4px;}
  .field input[type=text], .field textarea{
    width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:13.5px;
    background:#fff;color:var(--ink);outline:none;resize:vertical;
  }
  .field input[type=text]:focus, .field textarea:focus{border-color:var(--focus, var(--agees));}
  .field textarea{min-height:80px;line-height:1.5;}
  .form-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-primary{flex:1;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;color:#fff;}
  .btn-secondary{flex:1;border:1px solid var(--border);background:#fff;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;color:var(--ink);}

  .loading-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--sub);font-size:13.5px;}
  .spinner{width:28px;height:28px;border-radius:50%;border:3px solid #e7e1d2;border-top-color:var(--agees);animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  ::selection{background:#c9a24a55;}
</style>
</head>

/* ============================= DATA (bilingue) ============================= */

const RIGHTS_AGEES = [
  { art:{ar:"المادة 14",fr:"Article 14"}, text:{ar:"الحق في مجانية العلاج بالمرافق الصحية العمومية، مع جهاز وقاية من الأمراض والحوادث، وجهاز يقظة خاص بمن يعيشون بمفردهم لحمايتهم من مخاطر العزلة.",fr:"Droit à la gratuité des soins dans les établissements de santé publics, avec un dispositif de prévention des maladies et accidents, et un dispositif de veille pour les personnes vivant seules afin de les protéger des risques de l'isolement."}},
  { art:{ar:"المادة 15",fr:"Article 15"}, text:{ar:"الاستفادة من مجانية أو تخفيض أسعار النقل البري والجوي والبحري والسككي، ويستفيد المرافق أيضاً من نفس الإجراءات إذا كان بصدد تلقي العلاج.",fr:"Bénéfice de la gratuité ou de la réduction des tarifs de transport terrestre, aérien, maritime et ferroviaire ; l'accompagnateur bénéficie des mêmes mesures lorsqu'il s'agit de recevoir des soins."}},
  { art:{ar:"المادة 16",fr:"Article 16"}, text:{ar:"الأولوية في المرافق التي تضمن خدمة عمومية، وفي الصفوف الأمامية بالأماكن الثقافية والرياضية والترفيهية، وفي وسائل النقل العمومي.",fr:"Priorité dans les structures assurant un service public, dans les premiers rangs des lieux culturels, sportifs et de loisirs, ainsi que dans les transports publics."}},
  { art:{ar:"المادتان 20-21",fr:"Articles 20-21"}, text:{ar:"الشخص المسن المعتمد على الغير يحتاج مساعدة الغير لإنجاز أعمال الحياة اليومية أو مراقبة منتظمة، ويستفيد المعوزون منهم من عناية خاصة.",fr:"La personne âgée dépendante est celle qui a besoin de l'aide d'autrui pour les actes de la vie quotidienne ou d'une surveillance régulière ; les personnes démunies parmi elles bénéficient d'une prise en charge particulière."}},
  { art:{ar:"المادة 24",fr:"Article 24"}, text:{ar:"كل شخص مسن في وضعية صعبة و/أو بدون سند عائلي وموارده غير كافية، يفتح له الحق في مساعدة اجتماعية و/أو منحة مالية لا تقل عن ثلثي الأجر الوطني الأدنى المضمون.",fr:"Toute personne âgée en situation difficile et/ou sans soutien familial dont les ressources sont insuffisantes ouvre droit à une aide sociale et/ou une allocation financière ne pouvant être inférieure aux deux tiers du SNMG."}},
  { art:{ar:"المادة 39",fr:"Article 39"}, text:{ar:"يُخصَّص سنوياً ضمن « الصندوق الخاص للتضامن الوطني » اعتمادات إضافية للتكفل بالأشخاص المسنين.",fr:"Un « Fonds spécial de solidarité nationale » alloue chaque année des crédits supplémentaires à la prise en charge des personnes âgées."}},
  { art:{ar:"المادة 41",fr:"Article 41"}, text:{ar:"يوم 27 أفريل من كل سنة هو « اليوم الوطني للشخص المسن ».",fr:"Le 27 avril de chaque année est la « Journée nationale de la personne âgée »."}},
];

const LEGAL_FRAMEWORK_AGEES = [
  { law:{ar:"قانون الأسرة رقم 84-11 (9 جوان 1984)",fr:"Loi de la famille n° 84-11 (9 juin 1984)"}, text:{ar:"المادتان 2 و3: العلاقات بين أفراد الأسرة تقوم على التضامن والتماسك وحسن الخُلق.",fr:"Art. 2 et 3 : les relations entre membres de la famille reposent sur la solidarité, la cohésion et la bonne moralité."}},
  { law:{ar:"قانون الصحة رقم 85-05 (16 فيفري 1985)",fr:"Loi de la santé n° 85-05 (16 février 1985)"}, text:{ar:"المواد 67، 90، 91، 92: الأشخاص في وضعية صعبة، بمن فيهم المسنون، يستفيدون من الحماية الصحية والاجتماعية.",fr:"Art. 67, 90, 91, 92 : les personnes en situation difficile, dont les personnes âgées, bénéficient d'une protection sanitaire et sociale."}},
  { law:{ar:"القانون رقم 10-12 (29 ديسمبر 2010)",fr:"Loi n° 10-12 (29 décembre 2010)"}, text:{ar:"النص المرجعي الأساسي لحماية الأشخاص المسنين، يسري على كل شخص بلغ 65 سنة فما فوق.",fr:"Texte de référence principal relatif à la protection des personnes âgées, applicable à toute personne ayant atteint 65 ans révolus."}},
];

const AGEES = [
  { id:"fpa", group:{ar:"الاستقبال والإيواء",fr:"Accueil et hébergement"},
    name:{ar:"دار المسنين — الإيواء الدائم (FPA)",fr:"Foyer pour Personnes Âgées — Hébergement permanent (FPA)"},
    legalBasis:{ar:"المرسوم التنفيذي رقم 12-113 المؤرخ في 7 مارس 2012",fr:"Décret exécutif n° 12-113 du 7 mars 2012"},

/* ============================= STATE ============================= */
let state = { view:"home", lang:"fr", catKey:null, itemId:null, query:"", group:null, tab:"programs",
  editMode:false, addMode:false, loaded:false };

let overridesStore = {};   // key: catKey+':'+id -> {ar:{field:val}, fr:{field:val}}
let customItemsStore = { agees:[], enfance:[] };

function setState(patch){ Object.assign(state, patch); render(); window.scrollTo(0,0); }
function T(){ return STRINGS[state.lang]; }
function L(field){ if(!field) return ""; return field[state.lang] || field.ar || field.fr || ""; }

/* ============================= STORAGE ============================= */
async function loadStorage(){
  try{
    const list = await window.storage.list('override:', false);
    if(list && list.keys){
      for(const k of list.keys){
        try{
          const res = await window.storage.get(k, false);
          if(res){
            const rest = k.slice('override:'.length);
            const sep = rest.indexOf(':');
            const catKey = rest.slice(0,sep), id = rest.slice(sep+1);
            overridesStore[catKey+':'+id] = JSON.parse(res.value);
          }
        }catch(e){}
      }
    }
  }catch(e){ /* first run: no overrides yet */ }

  for(const catKey of Object.keys(CATEGORY_META)){
    try{
      const res = await window.storage.get('customlist:'+catKey, false);
      if(res) customItemsStore[catKey] = JSON.parse(res.value);
    }catch(e){ customItemsStore[catKey] = customItemsStore[catKey] || []; }
  }
}

async function saveOverride(catKey, id, lang, fields){
  const key = 'override:'+catKey+':'+id;
  const existing = overridesStore[catKey+':'+id] || {};
  existing[lang] = Object.assign({}, existing[lang]||{}, fields);
  overridesStore[catKey+':'+id] = existing;
  try{ await window.storage.set(key, JSON.stringify(existing), false); }catch(e){ console.error('save failed', e); }
}

async function saveCustomList(catKey){
  try{ await window.storage.set('customlist:'+catKey, JSON.stringify(customItemsStore[catKey]), false); }catch(e){ console.error('save failed', e); }
}

/* ============================= DATA HELPERS ============================= */
function getItems(catKey){
  const base = CATEGORY_META[catKey].data.map(it=>applyOverride(it, catKey));
  const custom = (customItemsStore[catKey]||[]).map(it=>applyOverride(it, catKey, true));
  return base.concat(custom);
}
function applyOverride(item, catKey, isCustom){
  const ov = overridesStore[catKey+':'+item.id];
  const merged = JSON.parse(JSON.stringify(item));
  if(ov){
    for(const lang of ['ar','fr']){
      if(ov[lang]){
        for(const field of Object.keys(ov[lang])){
          if(!merged[field] || typeof merged[field] !== 'object') merged[field] = {};
          merged[field][lang] = ov[lang][field];
        }
      }
    }
    merged._edited = true;
  }
  merged._custom = !!isCustom;
  return merged;
}
function getAllItemsFlat(){
  const arr = [];
  Object.keys(CATEGORY_META).forEach(catKey=>{
    getItems(catKey).forEach(it=> arr.push(Object.assign({catKey}, it)));
  });
  return arr;
}
function findItem(catKey, id){
  return getItems(catKey).find(it=>it.id===id);
}

/* --------------------------- EDIT / ADD FORM --------------------------- */
const LIST_FIELDS = ["conditions","documents","procedure","institutions","missions","avantages","who"];
const TEXT_FIELDS = ["name","group","legalBasis","description","notes"];

function fieldVal(item, field){
  if(!item[field]) return "";
  const v = item[field][state.lang];
  if(Array.isArray(v)) return v.join("\n");
  return v || "";
}

function renderForm(cat, item){
  const t = T();
  const isNew = !item;
  const title = isNew ? t.addItemTitle : t.editItemTitle;

  let fieldsHTML = "";
  fieldsHTML += '<div class="field"><label>'+t.fieldName+'</label><input type="text" id="f-name" value="'+esc(isNew?"":fieldVal(item,"name"))+'"/></div>';
  fieldsHTML += '<div class="field"><label>'+t.fieldGroup+'</label><input type="text" id="f-group" value="'+esc(isNew?(state.group&&state.group!==t.groupAll?state.group:""):fieldVal(item,"group"))+'"/></div>';
  fieldsHTML += '<div class="field"><label>'+t.fieldLegalBasis+'</label><input type="text" id="f-legalBasis" value="'+esc(isNew?"":fieldVal(item,"legalBasis"))+'"/></div>';
  fieldsHTML += '<div class="field"><label>'+t.fieldDescription+'</label><textarea id="f-description" rows="3">'+esc(isNew?"":fieldVal(item,"description"))+'</textarea></div>';
  LIST_FIELDS.forEach(f=>{
    if(!isNew && !item[f]) return;
    const label = t[f] || f;
    fieldsHTML += '<div class="field"><label>'+esc(label)+' <span class="hint">('+t.listHint+')</span></label><textarea id="f-'+f+'" rows="4">'+esc(isNew?"":fieldVal(item,f))+'</textarea></div>';
  });
  if(isNew){
    ["conditions","documents","procedure","institutions"].forEach(f=>{
      if(fieldsHTML.indexOf('id="f-'+f+'"')===-1){
        const label = t[f] || f;
        fieldsHTML += '<div class="field"><label>'+esc(label)+' <span class="hint">('+t.listHint+')</span></label><textarea id="f-'+f+'" rows="4"></textarea></div>';
      }
    });
  }
  fieldsHTML += '<div class="field"><label>'+t.fieldNotes+'</label><textarea id="f-notes" rows="3">'+esc(isNew?"":fieldVal(item,"notes"))+'</textarea></div>';

  return '<div>'+
    '<div class="topbar">'+
      '<div class="toprow"><button class="backbtn" data-action="'+(isNew?'close-add':'close-edit')+'" style="color:'+cat.accent+'">'+ICONS.arrowright+' '+t.cancel+'</button>'+langBtnHTML()+'</div>'+
      '<h1 style="font-size:18px">'+title+'</h1>'+
    '</div>'+
    '<div class="form-wrap">'+fieldsHTML+
      '<div class="form-actions">'+
        '<button class="btn-secondary" data-action="'+(isNew?'close-add':'close-edit')+'">'+t.cancel+'</button>'+
        '<button class="btn-primary" data-action="'+(isNew?'save-add':'save-edit')+'" style="background:'+cat.accent+'">'+t.save+'</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function collectFormFields(){
  const ids = ["name","group","legalBasis","description","notes",...LIST_FIELDS];
  const out = {};
  ids.forEach(f=>{
    const el = document.getElementById('f-'+f);
    if(!el) return;
    const val = el.value;
    if(LIST_FIELDS.includes(f)){
      const arr = val.split("\n").map(s=>s.trim()).filter(Boolean);
      if(arr.length) out[f] = arr;
    } else {
      if(val.trim()) out[f] = val.trim();
    }
  });
  return out;
}

/* ============================= RENDER ROOT ============================= */
function render(){
  const t = T();
  document.documentElement.setAttribute('dir', t.dir);
  document.documentElement.setAttribute('lang', t.htmlLang);
  document.body.className = state.lang==='ar' ? 'lang-ar' : 'lang-fr';

  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div>'+t.loading+'</div></div>';
    return;
  }
  let html = "";
  if(state.view==="home") html = renderHome();
  else if(state.view==="category") html = renderCategory();
  else if(state.view==="detail") html = renderDetail();
  else if(state.view==="add") html = renderForm(CATEGORY_META[state.catKey], null);
  app.innerHTML = html;

  if(state.view==="home"){
    const input = document.getElementById('search-input');
    if(input){
      input.addEventListener('input', (e)=>{
        state.query = e.target.value;
        const pos = e.target.selectionStart;
        render();
        const ni = document.getElementById('search-input');
        if(ni){ ni.focus(); ni.selectionStart = ni.selectionEnd = pos; }
      });
    }
  }
}

/* ============================= EVENTS ============================= */
document.getElementById('app').addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.getAttribute('data-action');

  if(action==="open-cat"){ setState({ view:"category", catKey:el.getAttribute('data-cat'), group:null, tab:"programs" }); }
  else if(action==="open-item"){ setState({ view:"detail", catKey:el.getAttribute('data-cat'), itemId:el.getAttribute('data-id'), editMode:false }); }
  else if(action==="go-home"){ setState({ view:"home", query:"" }); }
  else if(action==="go-category"){ setState({ view:"category", editMode:false }); }
  else if(action==="set-tab"){ setState({ tab: el.getAttribute('data-tab') }); }
  else if(action==="set-group"){ setState({ group: el.getAttribute('data-group') }); }
  else if(action==="clear-search"){ setState({ query:"" }); }
  else if(action==="toggle-lang"){ setState({ lang: state.lang==='fr' ? 'ar' : 'fr' }); }
  else if(action==="open-edit"){ setState({ editMode:true }); }
  else if(action==="close-edit"){ setState({ editMode:false }); }
  else if(action==="open-add"){ setState({ view:"add", itemId:null, editMode:false, addMode:true }); }
  else if(action==="close-add"){ setState({ view:"category" }); }
  else if(action==="save-edit"){
    const fields = collectFormFields();
    const cat = CATEGORY_META[state.catKey];
    saveOverride(state.catKey, state.itemId, state.lang, fields).then(()=> setState({ editMode:false }) );
  }
  else if(action==="save-add"){
    const fields = collectFormFields();
    if(!fields.name){ return; }
    const id = "custom-"+Date.now();
    const newItem = { id, group:{}, name:{}, legalBasis:{}, description:{}, notes:{} };
    ["name","group","legalBasis","description","notes"].forEach(f=>{
      newItem[f][state.lang] = fields[f] || "";
    });
    LIST_FIELDS.forEach(f=>{ if(fields[f]){ newItem[f] = {}; newItem[f][state.lang] = fields[f]; } });
    const catKey = state.catKey;
    customItemsStore[catKey] = customItemsStore[catKey] || [];
    customItemsStore[catKey].push(newItem);
    saveCustomList(catKey).then(()=> setState({ view:"category" }) );
  }
  else if(action==="delete-item"){
    const t = T();
    if(!confirm(t.deleteConfirm)) return;
    const catKey = state.catKey;
    customItemsStore[catKey] = (customItemsStore[catKey]||[]).filter(it=>it.id!==state.itemId);
    saveCustomList(catKey).then(()=> setState({ view:"category" }) );
  }
});

/* ============================= INIT ============================= */
(async function init(){
  render();
  await loadStorage();
  state.loaded = true;
  render();
})();
</script>
</body>
